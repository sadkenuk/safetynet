server {
    listen 80;
    server_name _;

    # Proxy all /api/* calls to data.police.uk.
    # This runs server-side so there are no CORS issues — the browser only
    # ever talks to the container, never directly to data.police.uk.
    location /api/ {
        proxy_pass            https://data.police.uk/api/;
        proxy_ssl_server_name on;
        proxy_set_header      Host data.police.uk;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_set_header      Accept-Encoding "";
        proxy_read_timeout    30s;
        proxy_connect_timeout 10s;
    }

    # Serve static files
    location / {
        root  /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
